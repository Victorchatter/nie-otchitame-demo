apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nie-otchitame-ingress
  namespace: nie-otchitame
  annotations:
    # Example annotations for nginx-ingress; adjust for your cluster
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: nie-otchitame.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
  # tls:
  #   - hosts:
  #       - nie-otchitame.local
  #     secretName: nie-otchitame-tls
